name: Build llama.cpp MTP Windows CUDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          method: network
          sub-packages: '["nvcc_12.8", "cudart_12.8", "cublas_12.8", "cublas_dev_12.8"]'

      - name: Clone llama.cpp MTP branch
        shell: pwsh
        run: |
          git clone --depth 1 --branch mtp-clean https://github.com/am17an/llama.cpp.git

      - name: Configure llama.cpp
        shell: pwsh
        run: |
          cmake llama.cpp -B llama.cpp/build `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_CUDA=ON

      - name: Build llama-server
        shell: pwsh
        run: |
          cmake --build llama.cpp/build `
            --config Release `
            --target llama-server `
            -j 2

      - name: Copy single binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Copy-Item `
            "llama.cpp/build/bin/Release/llama-server.exe" `
            "artifact/llama-server-mtp-windows-cuda.exe"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-mtp-windows-cuda
          path: artifact/llama-server-mtp-windows-cuda.exe
