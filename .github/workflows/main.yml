name: Build llama.cpp MTP Windows CUDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Install CUDA 12.8.1
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.1'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Show CUDA version
        shell: pwsh
        run: |
          nvcc --version

      - name: Clone llama.cpp MTP branch
        shell: pwsh
        run: |
          git clone --depth 1 --branch mtp-clean https://github.com/am17an/llama.cpp.git

      - name: Configure CUDA build
        shell: pwsh
        run: |
          cmake llama.cpp -B llama.cpp/build `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_CUDA=ON

      - name: Build llama-server MTP binary
        shell: pwsh
        run: |
          cmake --build llama.cpp/build `
            --config Release `
            --clean-first `
            --target llama-server `
            -j 2

      - name: Copy single executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null

          Copy-Item `
            "llama.cpp/build/bin/Release/llama-server.exe" `
            "out/llama-server-qwen36-mtp-windows-cuda.exe"

      - name: Upload single executable
        uses: actions/upload-artifact@v7
        with:
          path: out/llama-server-qwen36-mtp-windows-cuda.exe
          archive: false
